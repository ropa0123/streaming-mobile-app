workflows:
  android-build:
    name: Tech Hub Solutions APK Build
    max_build_duration: 60
    # FIX: Change 'linux' to 'mac_mini_m2' to stay on the Free Plan
    instance_type: mac_mini_m2 
    environment:
      vars:
        PYTHON_VERSION: "3.12"
    scripts:
      - name: Install Python Fixes & Buildozer
        script: |
          pip install --upgrade pip
          # Fix for the distutils error in Python 3.12
          pip install "setuptools<70.0.0" 
          pip install buildozer
          pip install Cython==0.29.33
      - name: Build APK
        script: |
          # On macOS, Buildozer may need specific paths or 'yes' to accept SDKs
          yes | buildozer -v android debug
    artifacts:
      - bin/*.apk
