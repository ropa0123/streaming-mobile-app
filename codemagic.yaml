workflows:
  android-build:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1 # Or linux
    environment:
      groups:
        - magic_variables # If you have any secret groups
      vars:
        PYTHON_VERSION: "3.10" # Define it as a custom variable instead
    scripts:
      - name: Install dependencies
        script: |
          # Use the pre-installed python or switch versions
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install buildozer # or flet
      - name: Build APK
        script: |
          # Run your specific build command
          buildozer android debug 
          # OR if using Flet: flet build apk
    artifacts:
      - bin/*.apk
      - .buildozer/android/platform/build-armeabi-v7a/dists/myapp/bin/*.apk
