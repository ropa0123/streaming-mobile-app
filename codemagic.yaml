workflows:
  android-build:
    name: Tech Hub Solutions APK Build
    max_build_duration: 60
    instance_type: mac_mini_m2 
    environment:
      vars:
        PYTHON_VERSION: "3.12"
    scripts:
      - name: Install Python Fixes & Buildozer
        script: |
          pip install --upgrade pip
          # Fix for 'distutils' error in Python 3.12
          pip install "setuptools<70.0.0" 
          # Fix for Buildozer compatibility (must be < 3.0)
          pip install "Cython==0.29.33"
          pip install buildozer

      - name: Build APK
        script: |
          # Force refresh of python-for-android to support AAB
          rm -rf .buildozer/android/platform/python-for-android
          
          # Accept licenses and start build
          yes | buildozer -v android debug
    artifacts:
      - bin/*.apk
